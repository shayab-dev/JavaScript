<!DOCTYPE html>
<html lang="en">
<head>
  <title>Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="calculator">

      <div class="display">
          <input type="text" placeholder="0" id="screen">
      </div>
      
      <div class="container">
        <div class="buttons">
          <button class="btn" id="AC">AC</button>
          <button class="btn" id="bracket">( )</button>
          <button class="btn" id="divide1">%</button>
          <button class="btn" id="divide2">&divide</button>

          <button class="btn">7</button>
          <button class="btn">8</button>
          <button class="btn">9</button>
          <button class="btn" id="multiply">&times</button>

          <button class="btn">4</button>
          <button class="btn">5</button>
          <button class="btn">6</button>
          <button class="btn" id="minus">-</button>

          <button class="btn">1</button>
          <button class="btn">2</button>
          <button class="btn">3</button>
          <button class="btn" id="plus">+</button>

          <button class="btn">0</button>
          <button class="btn">.</button>
          <button class="btn" id="del">DEL</button>
          <button class="btn" id="equal">=</button>
          
        </div>
      </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
