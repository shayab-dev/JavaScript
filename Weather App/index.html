<!DOCTYPE html>
<html lang="en">
<head>
  <title>Weather App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <div class="search">
      <input type="text" placeholder="enter city name" spellcheck="false">

      <button type="button"><img src="https://cdn-icons-png.flaticon.com/128/3031/3031293.png"></button>

    </div>

    <div class="weather">
      <img src="https://cdn-icons-png.flaticon.com/128/7334/7334340.png" class="weather-icon">
      <h1 class="temp">22°c</h1>
      <h2 class="city">New York</h2>

      <div class="details">
        <div class="col">
          <img src="https://cdn-icons-png.flaticon.com/128/5664/5664979.png">
          <div>
            <p class="humidity">50%</p>
            <p>Humidity</p>
          </div>
        </div>

        <div class="col">
          <img src="https://cdn-icons-png.flaticon.com/128/11742/11742598.png">
          <div>
            <p class="wind">15 km/h</p>
            <p>Wind Speed</p>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
