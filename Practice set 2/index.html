<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Myntra Bag</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <button class="btn" id="btn1" onclick="cartQuantity++ ;items.innerText = `Your bag has ${cartQuantity} items`;">Add to Bag</button>

  <button class="btn" id="btn2" onclick="cartQuantity-- ;items.innerText = `Your bag has ${cartQuantity} items`;">MOVE TO WISHLIST</button>

  <button class="btn" id="btn1" onclick="cartQuantity += 2;items.innerText = `Your bag has ${cartQuantity} items`;">Add 1+1 Sale Item</button>

  <h1 id="cart-summary"></h1>

  <script src="script.js"></script>
</body>
</html>
