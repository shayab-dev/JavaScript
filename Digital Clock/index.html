<!DOCTYPE html>
<html lang="en">
<head>
  <title>Digital Clock</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="digitalclock">
    <div class="time">

      <div class="leftside">

        <div>
          <span id="hour">00</span>
        </div>
      </div>

      <div class="rightside">

        <div class="righttop">
          <span id="dot">:</span>
          <span id="min">00</span>
        </div>

        <div class="rightdown">
          <span id="timezone">PM</span>
          <span id="sec">00</span>
        </div>

      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
