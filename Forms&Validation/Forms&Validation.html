<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        small{
            color: red;
            font-size: 12px;
        }
        #hide{
            display: none;
        }
    </style>
</head>
<body>
    <form autocomplete="off">
        <input id="name" type="text" placeholder="name"><br>
        <div id="hide">
            
                 <small>name should be greater than 2 character</small>
        </div><br><br>
        <input type="email" placeholder="email"><br><br>
        <input type="password" placeholder="password"><br><br>

        <select>
            <option value="male">male</option><br><br>
            <option value="female">female</option><br><br>
            <option value="others">others</option><br><br>
        </select><br><br>

        <textarea placeholder="Tell us about you..."></textarea><br><br>
        
        <input type="submit">
    </form>
    
    <script src="Forms&Validation.js"></script>
</body>
</html>
